<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABI · Supply Chain Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600&family=Source+Serif+4:opsz,ital,wght@8..60,1,400;8..60,1,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root {
            --navy: #1A2636;
            --navy-deep: #131D2A;
            --navy-mid: #1E2D3F;
            --red: #C62828;
            --red-bright: #E53935;
            --white: #FFFFFF;
            --silver: #B0BEC5;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--navy-deep); 
            color: var(--white); 
            font-family: var(--font-body); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .app-header {
            padding: 12px 48px;
            background: var(--navy);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-text { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 3px; font-size: 14px; }

        .ticker { background: #000; border-bottom: 1px solid var(--red); overflow: hidden; padding: 10px 0; }
        .ticker-track { display: inline-block; animation: scroll 40s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 30px; font-family: var(--font-mono); font-size: 12px; color: var(--silver); }
        .ticker-item span { color: var(--red-bright); font-weight: bold; }

        .main-viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, var(--navy-mid), var(--navy-deep)); }
        #mapSvg { width: 100%; height: 100%; }

        .country { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.1); stroke-width: 0.5; transition: all 0.3s; cursor: pointer; }
        .country-adversarial { fill: rgba(198, 40, 40, 0.15); stroke: rgba(198, 40, 40, 0.3); }
        .country-allied { fill: rgba(76, 175, 80, 0.1); }

        .route { fill: none; stroke-dasharray: 5,5; animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -100; } }

        .ui-overlay { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .control-btn { 
            pointer-events: all;
            background: var(--navy); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--silver);
            padding: 10px 20px;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-align: left;
        }

        .detail-panel {
            position: absolute; top: 0; right: 0; width: 400px; height: 100%;
            background: var(--navy); border-left: 1px solid rgba(255,255,255,0.1);
            transform: translateX(100%); transition: 0.4s ease;
            padding: 40px; overflow-y: auto; z-index: 200;
        }
        .detail-panel.open { transform: translateX(0); }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <span class="logo-text">ABI · Supply Chain Intelligence Portal</span>
    </div>
</header>

<div class="ticker">
    <div class="ticker-track">
        <div class="ticker-item">NATIONAL SECURITY RISK: <span>80%+</span> API FOREIGN DEPENDENCY</div>
        <div class="ticker-item">SCIENTIFIC DISARMAMENT: <span>35%</span> DOMESTIC MFG DECLINE</div>
        <div class="ticker-item">NATIONAL SECURITY RISK: <span>80%+</span> API FOREIGN DEPENDENCY</div>
    </div>
</div>

<div class="main-viewport">
    <div class="ui-overlay">
        <button class="control-btn">/// ACTIVE ASSESSMENT</button>
    </div>
    <svg id="mapSvg"></svg>
    <div class="detail-panel" id="detailPanel">
        <div id="detailContent"></div>
    </div>
</div>

<script>
    const REGIONS = {
        156: { 
            name: "CHINA", 
            threat: "CRITICAL VULNERABILITY",
            brief: "We risk losing control over our critical medicine supply when 40% of U.S. APIs originate from China. This is a strategic choke point adversaries can exploit at will."
        },
        356: { 
            name: "INDIA", 
            threat: "STRATEGIC DEPENDENCY",
            brief: "India's reliance on China for 60-70% of its APIs ultimately funnels back to a single adversarial source, creating an opaque national security risk."
        },
        840: { 
            name: "UNITED STATES", 
            threat: "UNILATERAL DISARMAMENT",
            brief: "Domestic production has declined 35% since 2006. Policy breaches are leading toward scientific disarmament and a dangerous reliance on foreign powers."
        }
    };

    const svg = d3.select("#mapSvg");
    const projection = d3.geoNaturalEarth1();
    const path = d3.geoPath().projection(projection);

    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
        const countries = topojson.feature(data, data.objects.countries);
        
        svg.append("g")
            .selectAll("path")
            .data(countries.features)
            .enter().append("path")
            .attr("class", d => REGIONS[d.id] ? "country country-adversarial" : "country")
            .attr("d", path)
            .on("click", (e, d) => showDetail(d.id));

        // Illustrative Travel Lines (Example: China to US)
        const routes = [
            { from: [104, 35], to: [-95, 37], threat: true }
        ];

        routes.forEach(r => {
            const start = projection(r.from);
            const end = projection(r.to);
            svg.append("path")
                .attr("d", `M${start[0]},${start[1]} Q${(start[0]+end[0])/2},${start[1]-100} ${end[0]},${end[1]}`)
                .attr("class", "route")
                .attr("stroke", r.threat ? "#E53935" : "#B0BEC5")
                .attr("stroke-width", 2);
        });
    });

    function showDetail(id) {
        const region = REGIONS[id];
        if (!region) return;
        const panel = document.getElementById("detailPanel");
        document.getElementById("detailContent").innerHTML = `
            <h3>${region.name}</h3>
            <p><strong>STATUS: ${region.threat}</strong></p>
            <p>${region.brief}</p>
            <button onclick="document.getElementById('detailPanel').classList.remove('open')">Close</button>
        `;
        panel.classList.add("open");
    }
</script>
</body>
</html>
