<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABI · Supply Chain Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600&family=Source+Serif+4:opsz,ital,wght@8..60,1,400;8..60,1,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root {
            /* Colors synced from index.html */
            --navy: #1A2636;
            --navy-deep: #131D2A;
            --navy-mid: #1E2D3F;
            --red: #C62828;
            --red-bright: #E53935;
            --white: #FFFFFF;
            --silver: #B0BEC5;
            --white-08: rgba(255,255,255,0.08);
            --font-display: 'Barlow Condensed', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--navy-deep); 
            color: var(--white); 
            font-family: var(--font-body); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION (from index.html) --- */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 48px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(26, 38, 54, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--white-08);
        }

        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-mark { height: 36px; width: 36px; }
        .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.3); margin: 0 12px; }
        .nav-logo-text { font-family: var(--font-display); font-weight: 600; font-size: 13px; letter-spacing: 3.5px; color: rgba(255,255,255,0.9); text-transform: uppercase; }

        .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
        .nav-links a { font-family: var(--font-display); font-weight: 500; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.7); text-decoration: none; }
        .nav-cta { padding: 10px 24px; border: 1px solid var(--red); color: var(--white); }

        /* --- MAP HUD --- */
        .main-viewport { flex: 1; position: relative; margin-top: 72px; background: radial-gradient(circle at center, var(--navy-mid), var(--navy-deep)); }
        #mapSvg { width: 100%; height: 100%; }

        .controls { position: absolute; top: 30px; left: 40px; z-index: 50; }
        .control-group { background: rgba(26, 38, 54, 0.85); padding: 20px; border: 1px solid var(--white-08); backdrop-filter: blur(10px); }
        .control-item { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); letter-spacing: 2px; font-size: 12px; margin-bottom: 8px; color: var(--silver); cursor: pointer; }
        .control-item input { accent-color: var(--red-bright); }

        .scan-line { position: absolute; left: 0; right: 0; height: 1px; background: var(--red-bright); opacity: 0.3; pointer-events: none; animation: scan 8s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* --- COUNTRIES & ROUTES --- */
        .country { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.15); transition: 0.3s; cursor: pointer; }
        .country-adversarial { fill: rgba(198, 40, 40, 0.2); }
        .country-allied { fill: rgba(76, 175, 80, 0.1); }
        .route-line { fill: none; stroke-dasharray: 8, 4; animation: dashMove 30s linear infinite; }
        @keyframes dashMove { to { stroke-dashoffset: -1000; } }

        /* --- DETAIL PANEL --- */
        .detail-panel {
            position: absolute; top: 0; right: 0; width: 420px; height: 100%;
            background: var(--navy); border-left: 2px solid var(--red);
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 40px; overflow-y: auto; z-index: 200; box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }
        .detail-panel.open { transform: translateX(0); }
        .stat-card { background: var(--navy-deep); border: 1px solid rgba(255,255,255,0.05); padding: 25px; margin: 20px 0; }
        .stat-num { font-family: var(--font-display); font-size: 48px; font-weight: 800; color: var(--red-bright); line-height: 1; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-logo">
        <svg class="nav-mark" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="5" fill="#1A2636"/><circle cx="18" cy="18" r="12" fill="none" stroke="#B0BEC5" stroke-width="2"/><circle cx="18" cy="18" r="4" fill="#C62828"/></svg>
        <div class="nav-divider"></div>
        <div class="nav-logo-text">The American Biosecurity Initiative</div>
    </a>
    <ul class="nav-links">
        <li><a href="#threat">The Threat</a></li>
        <li><a href="#pillars">Our Pillars</a></li>
        <li><a href="#readiness">Readiness</a></li>
        <li><a href="#intel" class="nav-cta">Take Action</a></li>
    </ul>
</nav>

<div class="main-viewport">
    <div class="scan-line"></div>
    <div class="controls">
        <div class="control-group">
            <div style="font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,0.3); margin-bottom:10px; letter-spacing:2px;">DATA LAYERS</div>
            <label class="control-item"><input type="checkbox" checked onchange="toggleLayer('adversarial')"> ADVERSARIAL ROUTES</label>
            <label class="control-item"><input type="checkbox" checked onchange="toggleLayer('allied')"> ALLIED ROUTES</label>
        </div>
    </div>

    <svg id="mapSvg"></svg>

    <div class="detail-panel" id="detailPanel">
        <button style="float:right; background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="closePanel()">×</button>
        <div id="detailContent" style="margin-top:40px;"></div>
    </div>
</div>

                if(region) showDetail(region);
            });
        renderRoutes();
    });
