<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABI · Global Supply Chain Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600&family=Source+Serif+4:opsz,ital,wght@8..60,1,400;8..60,1,600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root {
            --navy: #1A2636;
            --navy-deep: #131D2A;
            --navy-mid: #1E2D3F;
            --red: #C62828;
            --red-bright: #E53935;
            --white: #FFFFFF;
            --silver: #B0BEC5;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--navy-deep); 
            color: var(--white); 
            font-family: var(--font-body); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* --- UI OVERLAYS --- */
        .app-header {
            padding: 12px 48px;
            background: var(--navy);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .controls {
            position: absolute;
            top: 100px;
            left: 40px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group {
            background: rgba(26, 38, 54, 0.8);
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            letter-spacing: 2px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
            color: var(--silver);
        }

        .control-item input { accent-color: var(--red-bright); cursor: pointer; }

        /* --- MAP ELEMENTS --- */
        .main-viewport { flex: 1; position: relative; background: radial-gradient(circle at center, var(--navy-mid), var(--navy-deep)); }
        #mapSvg { width: 100%; height: 100%; }
        
        .country { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; }
        .country-adversarial { fill: rgba(198, 40, 40, 0.15); stroke: rgba(198, 40, 40, 0.4); }
        .country-allied { fill: rgba(76, 175, 80, 0.1); }
        .country-target { fill: rgba(255, 255, 255, 0.08); stroke: var(--white); stroke-width: 1px; }

        /* --- ANIMATED LINES --- */
        .route-path { fill: none; stroke-dasharray: 8, 4; stroke-width: 1.5; opacity: 0.6; }
        .particle { filter: drop-shadow(0 0 5px var(--red-bright)); }

        /* --- DETAIL PANEL --- */
        .detail-panel {
            position: absolute; top: 0; right: 0; width: 420px; height: 100%;
            background: var(--navy); border-left: 2px solid var(--red);
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px; overflow-y: auto; z-index: 200;
        }
        .detail-panel.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        
        .score-box { background: var(--navy-deep); border: 1px solid rgba(255,255,255,0.05); padding: 25px; margin: 20px 0; }
        .score-val { font-family: var(--font-display); font-size: 48px; font-weight: 800; color: var(--red-bright); line-height: 1; }
        .score-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--silver); margin-top: 10px; text-transform: uppercase; }
        
        .close-btn { background: var(--red); border: none; color: white; padding: 10px 20px; font-family: var(--font-display); letter-spacing: 2px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<header class="app-header">
    <div style="font-family:var(--font-display); letter-spacing:3px; text-transform:uppercase;">Supply Chain Intelligence Portal</div>
    <div style="font-family:var(--font-mono); font-size:10px; color:var(--red-bright);">LIVE ASSESSMENT // FEB 2026</div>
</header>

<div class="main-viewport">
    <div class="controls">
        <div class="control-group">
            <div style="font-family:var(--font-mono); font-size:9px; color:var(--white-30); margin-bottom:10px; letter-spacing:2px;">DATA LAYERS</div>
            <label class="control-item"><input type="checkbox" checked onchange="toggleLayer('nodes')"> API SOURCE NODES</label>
            <label class="control-item"><input type="checkbox" checked onchange="toggleLayer('adversarial')"> ADVERSARIAL ROUTES</label>
            <label class="control-item"><input type="checkbox" checked onchange="toggleLayer('allied')"> ALLIED ROUTES</label>
        </div>
    </div>

    <svg id="mapSvg"></svg>

    <div class="detail-panel" id="detailPanel">
        <button class="close-btn" onclick="closePanel()">CLOSE</button>
        <div id="detailContent" style="margin-top:40px;"></div>
    </div>
</div>

<script>
    const REGIONS = {
        156: { 
            name: "CHINA", color: "#E53935", type: "adversarial",
            threat: "CRITICAL VULNERABILITY",
            brief: "We risk losing control over our critical medicine supply when 40% of U.S. APIs originate from China. This is a strategic choke point adversaries can exploit at will, leaving our nation defenseless in a crisis.",
            share: "42%", theft: "$2.1B", coords: [104, 35]
        },
        356: { 
            name: "INDIA", color: "#FF9800", type: "diversified",
            threat: "STRATEGIC DEPENDENCY",
            brief: "India's reliance on China for 60-70% of its APIs ultimately funnels back to a single adversarial source. We are sacrificing our strategic independence for perceived short-term gains—a loss we cannot afford.",
            share: "28%", theft: "$0.8B", coords: [78, 22]
        },
        643: {
            name: "RUSSIA", color: "#FF5722", type: "adversarial",
            threat: "ELEVATED THREAT",
            brief: "While a minor API producer, Russia represents a primary vector for cyber-espionage and disinformation campaigns targeting American biopharmaceutical R&D capacity.",
            share: "2%", theft: "$1.2B", coords: [90, 62]
        },
        276: {
            name: "EU / ALLIED NATIONS", color: "#C49A2A", type: "allied",
            threat: "DECLINING CAPACITY",
            brief: "The allied manufacturing base is in structural decline, with global share falling from 32% to 18%. Trusted partners are currently constrained by policy-driven cost disadvantages.",
            share: "18%", theft: "LOW", coords: [10, 50]
        },
        840: { 
            name: "UNITED STATES", color: "#FFFFFF", type: "target",
            threat: "UNILATERAL DISARMAMENT",
            brief: "Domestic production has plummeted by 35% since 2006. Policy breaches are leading toward scientific disarmament and a dangerous, irreversible reliance on adversarial foreign powers.",
            share: "12%", theft: "TARGET", coords: [-95, 37]
        }
    };

    const svg = d3.select("#mapSvg");
    const projection = d3.geoNaturalEarth1().rotate([-10, 0]).scale(250);
    const path = d3.geoPath().projection(projection);
    const routeLayer = svg.append("g").attr("id", "routeLayer");
    const nodeLayer = svg.append("g").attr("id", "nodeLayer");

    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(data => {
        const countries = topojson.feature(data, data.objects.countries);
        
        svg.append("g")
            .selectAll("path")
            .data(countries.features)
            .enter().append("path")
            .attr("class", d => {
                const r = REGIONS[d.id];
                if (r) return `country country-${r.type}`;
                return "country";
            })
            .attr("d", path)
            .on("click", (e, d) => showDetail(d.id));

        renderRoutes();
    });

    function renderRoutes() {
        const target = projection(REGIONS[840].coords);
        
        Object.entries(REGIONS).forEach(([id, r]) => {
            if (id == 840) return;
            const start = projection(r.coords);
            const className = r.type === "allied" ? "allied" : "adversarial";
            
            // Draw Arc
            const d = `M${start[0]},${start[1]} Q${(start[0]+target[0])/2},${Math.min(start[1], target[1])-100} ${target[0]},${target[1]}`;
            
            routeLayer.append("path")
                .attr("d", d)
                .attr("class", `route-path route-${className}`)
                .attr("stroke", r.color);

            // Animated Particle
            const particle = routeLayer.append("circle")
                .attr("r", 3)
                .attr("fill", r.color)
                .attr("class", `particle route-${className}`);

            function animate() {
                particle.transition()
                    .duration(3000 + Math.random() * 2000)
                    .attrTween("transform", () => {
                        const i = d3.interpolateString(d, d);
                        const pathNode = routeLayer.append("path").attr("d", d).attr("display", "none").node();
                        const l = pathNode.getTotalLength();
                        return t => {
                            const p = pathNode.getPointAtLength(t * l);
                            return `translate(${p.x},${p.y})`;
                        };
                    })
                    .on("end", animate);
            }
            animate();
        });
    }

    function toggleLayer(type) {
        if (type === 'nodes') d3.select("#nodeLayer").style("opacity", event.target.checked ? 1 : 0);
        else d3.selectAll(`.route-${type}`).style("opacity", event.target.checked ? 1 : 0);
    }

    function showDetail(id) {
        const r = REGIONS[id];
        if (!r) return;
        document.getElementById("detailContent").innerHTML = `
            <div style="font-family:var(--font-mono); font-size:10px; color:var(--red-bright); letter-spacing:3px;">/// STATUS: ${r.threat}</div>
            <h2 style="font-family:var(--font-display); font-size:36px; font-weight:800; margin:15px 0;">${r.name}</h2>
            <p style="font-family:'Source Serif 4'; font-style:italic; line-height:1.6; color:var(--silver); font-size:18px;">${r.brief}</p>
            <div class="score-box">
                <div class="score-val">${r.share}</div>
                <div class="score-label">Global API Production Share</div>
            </div>
            <div class="score-box">
                <div class="score-val">${r.theft}</div>
                <div class="score-label">Documented Annual IP Theft</div>
            </div>
        `;
        document.getElementById("detailPanel").classList.add("open");
    }

    function closePanel() { document.getElementById("detailPanel").classList.remove("open"); }
</script>
</body>
</html>
