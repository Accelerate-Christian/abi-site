<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABI · Supply Chain Vulnerability Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        :root {
            --navy: #1A2636;
            --navy-deep: #131D2A;
            --navy-mid: #1E2D3F;
            --red: #C62828;
            --red-bright: #E53935;
            --white: #FFFFFF;
            --silver: #B0BEC5;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--navy-deep); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Branding Sync */
        .header {
            padding: 14px 28px;
            background: var(--navy);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .header-title { font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .live-status { font-family: var(--font-mono); font-size: 10px; color: var(--red-bright); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--red-bright); border-radius: 50%; animation: pulse 2s infinite; }

        /* Map UI */
        .main { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, var(--navy-mid), var(--navy-deep)); }
        #mapSvg { width: 100%; height: 100%; }
        
        .country { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.1); stroke-width: 0.4; transition: 0.3s; cursor: pointer; }
        .country-adversarial { fill: rgba(198, 40, 40, 0.15); }
        .country-allied { fill: rgba(76, 175, 80, 0.08); }
        .country:hover { fill: rgba(255,255,255,0.15); }

        /* Animation Layers */
        .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red-bright), transparent); opacity: 0.3; pointer-events: none; z-index: 5; animation: scan 8s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .route-line { fill: none; stroke-dasharray: 10, 5; animation: dashMove 30s linear infinite; opacity: 0.5; }
        @keyframes dashMove { to { stroke-dashoffset: -1000; } }

        /* Controls */
        .controls { position: absolute; top: 20px; left: 20px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }
        .control-btn { 
            background: rgba(26, 38, 54, 0.9); border: 1px solid rgba(255,255,255,0.1); color: var(--silver);
            padding: 10px 16px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 2px; font-size: 12px; cursor: pointer; text-align: left; min-width: 200px;
        }
        .control-btn.active { border-left: 3px solid var(--red-bright); color: white; background: var(--navy-mid); }

        /* Detail Panel */
        .detail-panel {
            position: absolute; top: 0; right: 0; width: 400px; height: 100%;
            background: var(--navy); border-left: 2px solid var(--red);
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            padding: 40px; overflow-y: auto; z-index: 200;
        }
        .detail-panel.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .close-x { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .stat-card { background: var(--navy-deep); border: 1px solid rgba(255,255,255,0.05); padding: 20px; margin: 20px 0; }
        .stat-num { font-family: var(--font-display); font-size: 44px; font-weight: 800; color: var(--red-bright); }
        .stat-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--silver); text-transform: uppercase; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div style="font-family:var(--font-mono); font-size:9px; letter-spacing:4px; color:var(--red-bright); margin-bottom:2px;">/// STRATEGIC INTELLIGENCE PORTAL</div>
        <div class="header-title">Supply Chain Vulnerability Map</div>
    </div>
    <div class="live-status"><div class="dot"></div> LIVE ASSESSMENT ACTIVE</div>
</div>

<div class="main">
    <div class="scan-line"></div>
    <div class="controls">
        <button class="control-btn active" id="btn-adversarial" onclick="toggleLayer('adversarial')">ADVERSARIAL ROUTES</button>
        <button class="control-btn active" id="btn-allied" onclick="toggleLayer('allied')">ALLIED ROUTES</button>
    </div>

    <svg id="mapSvg"></svg>

    <div class="detail-panel" id="detailPanel">
        <button class="close-x" onclick="closePanel()">×</button>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    const DATA = {
        china: { id: 156, name: "CHINA", threat: "CRITICAL VULNERABILITY", color: "#E53935", share: "42%", theft: "$2.1B", coords: [104, 35], type: 'adversarial',
            brief: "The illusion of resilient supply chains masks a dangerous reality. We have already lost control over essential medical provisions with 40% of U.S. APIs originating here. This is a layered dependency choke point that can be exploited at will."},
        india: { id: 356, name: "INDIA", threat: "STRATEGIC DEPENDENCY", color: "#FF9800", share: "28%", theft: "$0.8B", coords: [78, 22], type: 'adversarial',
            brief: "India's reliance on China for 60-70% of its APIs ultimately funnels back to a single adversarial source. We are sacrificing our strategic independence for perceived short-term gains—a loss we cannot afford."},
        russia: { id: 643, name: "RUSSIA", threat: "ELEVATED THREAT", color: "#FF5722", share: "2%", theft: "$1.2B", coords: [90, 62], type: 'adversarial',
            brief: "A primary vector for cyber-espionage and disinformation campaigns. Attacks target American biopharmaceutical R&D capacity to facilitate unilateral scientific disarmament."},
        eu: { id: 276, name: "EU / ALLIED NATIONS", threat: "DECLINING CAPACITY", color: "#C49A2A", share: "18%", theft: "LOW", coords: [10, 50], type: 'allied',
            brief: "Allied manufacturing is in structural decline. Share has fallen from 32% to 18%. Failing to support this base compels reliance on less transparent foreign entities and adversarial supply chains."},
        us: { id: 840, name: "UNITED STATES", threat: "UNILATERAL DISARMAMENT", color: "#FFFFFF", share: "12%", theft: "TARGET", coords: [-95, 37], type: 'target',
            brief: "Domestic production has plummeted 35% since 2006. Short-sighted policy choices are dismantling our R&D capacity, leading to an irreversible loss of strategic autonomy."}
    };

    const svg = d3.select("#mapSvg");
    const projection = d3.geoNaturalEarth1().rotate([-10, 0]).scale(240);
    const path = d3.geoPath().projection(projection);
    const routeLayer = svg.append("g");

    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
        const countries = topojson.feature(world, world.objects.countries);
        
        svg.append("g").selectAll("path")
            .data(countries.features)
            .enter().append("path")
            .attr("class", d => {
                const region = Object.values(DATA).find(r => r.id == d.id);
                return region ? `country country-${region.type}` : "country";
            })
            .attr("d", path)
            .on("click", (e, d) => {
                const region = Object.values(DATA).find(r => r.id == d.id);
                if(region) showDetail(region);
            });

        renderRoutes();
    });

    function renderRoutes() {
        const target = projection(DATA.us.coords);
        Object.values(DATA).forEach(r => {
            if (r.id === 840) return;
            const start = projection(r.coords);
            const d = `M${start[0]},${start[1]} Q${(start[0]+target[0])/2},${Math.min(start[1], target[1])-120} ${target[0]},${target[1]}`;
            
            routeLayer.append("path")
                .attr("d", d)
                .attr("class", `route-line route-${r.type}`)
                .attr("stroke", r.color)
                .attr("stroke-width", r.type === 'adversarial' ? 2 : 1.2);
        });
    }

    function toggleLayer(type) {
        const btn = document.getElementById(`btn-${type}`);
        const isActive = btn.classList.toggle('active');
        d3.selectAll(`.route-${type}`).style("display", isActive ? "inline" : "none");
    }

    function showDetail(r) {
        const panel = document.getElementById("detailPanel");
        document.getElementById("detailContent").innerHTML = `
            <div style="font-family:var(--font-mono); font-size:10px; color:var(--red-bright); letter-spacing:3px; margin-bottom:10px;">/// STATUS: ${r.threat}</div>
            <h2 style="font-family:var(--font-display); font-size:36px; font-weight:800; margin-bottom:20px;">${r.name}</h2>
            <p style="font-family:'Source Serif 4'; font-style:italic; line-height:1.6; color:var(--silver); font-size:18px; margin-bottom:30px;">${r.brief}</p>
            <div class="stat-card">
                <div class="stat-num">${r.share}</div>
                <div class="stat-label">Global API Share</div>
            </div>
            <div class="stat-card">
                <div class="stat-num">${r.theft}</div>
                <div class="stat-label">Documented Annual IP Theft</div>
            </div>
            <button class="control-btn" style="width:100%; border:1px solid var(--red-bright); color:white;" onclick="closePanel()">Return to Assessment</button>
        `;
        panel.classList.add("open");
    }

    function closePanel() { document.getElementById("detailPanel").classList.remove("open"); }
</script>

</body>
</html>
