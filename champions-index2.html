<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biosecurity Champion Index | American BioSecurity Initiative</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1A2636;
            --navy-deep: #0A1628;
            --navy-mid: #152A45;
            --red: #C62828;
            --red-bright: #E53935;
            --white: #FFFFFF;
            --silver: #B0BEC5;
            --cyan: #00ACC1;
            --ghost: rgba(255,255,255,0.7);
            --border: rgba(255,255,255,0.08);
            --grade-a: #2E7D32;
            --grade-f: #D32F2F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--navy-deep);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 48px; height: 72px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(26, 38, 54, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .nav-logo { display: flex; align-items: center; text-decoration: none; }
        .nav-mark { height: 36px; width: 36px; }
        .nav-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.3); margin: 0 12px; }
        .nav-logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 3.5px; color: rgba(255,255,255,0.9); text-transform: uppercase; }

        /* --- CONTAINER --- */
        .container { max-width: 1000px; margin: 120px auto 60px; padding: 0 24px; }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 60px; }
        .header-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 15px; }
        .header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 56px; font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 20px; }
        .header h1 span { color: var(--red-bright); }
        .header-sub { color: var(--silver); max-width: 700px; margin: 0 auto; line-height: 1.6; }

        /* --- SEARCH SECTION --- */
        .search-box { max-width: 600px; margin: 0 auto 80px; display: flex; gap: 15px; }
        .search-input { flex: 1; background: var(--navy-mid); border: 1px solid var(--border); padding: 18px 25px; color: white; font-family: 'IBM Plex Mono', monospace; font-size: 18px; outline: none; border-radius: 4px; }
        .search-input:focus { border-color: var(--cyan); }
        .lookup-btn { background: var(--red-bright); border: none; color: white; padding: 0 35px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; }

        /* --- RESULTS --- */
        .results-header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 30px; display: none; }
        .results-header.active { display: flex; }
        .zip-code { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; }
        .zip-code span { color: var(--cyan); }

        .scorecard { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; display: flex; overflow: hidden; animation: fadeInUp 0.5s ease both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grade-zone { width: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
        .grade-letter { font-family: 'Barlow Condensed', sans-serif; font-size: 68px; font-weight: 800; line-height: 1; }
        .grade-points { font-family: 'IBM Plex Mono', monospace; font-size: 12px; margin-top: 5px; opacity: 0.7; }

        .info-zone { flex: 1; padding: 30px; }
        .leg-name { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .leg-title { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--silver); margin-bottom: 20px; }
        .party-r { color: #EF5350; } .party-d { color: #42A5F5; }

        .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .cat-item { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ghost); text-transform: uppercase; }
        .cat-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .cat-fill { height: 100%; border-radius: 2px; }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 4px 10px; border-radius: 4px; border: 1px solid; text-transform: uppercase; }
        .tag.pos { color: #66BB6A; border-color: rgba(102,187,106,0.3); background: rgba(102,187,106,0.05); }
        .tag.neg { color: #EF5350; border-color: rgba(239,83,80,0.3); background: rgba(239,83,80,0.05); }

    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-logo">
        <svg class="nav-mark" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="5" fill="#1A2636"/><circle cx="18" cy="18" r="12" fill="none" stroke="#B0BEC5" stroke-width="2"/><circle cx="18" cy="18" r="4" fill="#C62828"/></svg>
        <div class="nav-divider"></div>
        <div class="nav-logo-text">The American Biosecurity Initiative</div>
    </a>
</nav>

<div class="container">
    <div class="header">
        <div class="header-label">Legislative Accountability</div>
        <h1>Biosecurity <span>Champion</span> Index</h1>
        <p class="header-sub">Scoring every member of Congress on their commitment to protecting America's pharmaceutical supply chain and bio-defense readiness.</p>
    </div>

    <div class="search-box">
        <input type="text" id="zipInput" class="search-input" placeholder="ENTER ZIP CODE (e.g., 22314)" maxlength="5">
        <button class="lookup-btn" onclick="lookupZip()">Look Up</button>
    </div>

    <div id="resultsHeader" class="results-header">
        <div class="zip-code">RESULTS FOR: <span id="displayZip"></span></div>
        <div style="font-family:'IBM Plex Mono'; font-size:11px; color:var(--silver);">119TH CONGRESS ASSESSMENT</div>
    </div>

    <div id="resultsGrid"></div>
</div>

<script>
    const LEGISLATORS = [
        { name: "Margaret Caldwell", party: "D", state: "VA", chamber: "Senate", score: 82, grade: "B", tags: ["BIOSECURE Act Co-sponsor", "Pharma Reshoring Advocate"], type: "pos", scores: [85, 78, 82, 80] },
        { name: "Robert Whitmore", party: "R", state: "VA", chamber: "Senate", score: 71, grade: "C", tags: ["Mixed record on Preparedness"], type: "pos", scores: [70, 75, 68, 72] },
        { name: "Thomas Rivera", party: "D", state: "VA", chamber: "House", score: 44, grade: "D", tags: ["Biosecurity Risk", "Voted Against API Tracking"], type: "neg", scores: [40, 38, 50, 48] }
    ];

    function lookupZip() {
        const zip = document.getElementById('zipInput').value;
        if (zip.length !== 5) return;

        document.getElementById('displayZip').innerText = zip;
        document.getElementById('resultsHeader').classList.add('active');
        
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = LEGISLATORS.map(l => `
            <div class="scorecard">
                <div class="grade-zone" style="background: ${l.score > 80 ? 'rgba(46,125,50,0.1)' : 'rgba(211,47,47,0.1)'};">
                    <div class="grade-letter" style="color: ${l.score > 80 ? 'var(--grade-a)' : 'var(--grade-f)'};">${l.grade}</div>
                    <div class="grade-points">${l.score}/100</div>
                </div>
                <div class="info-zone">
                    <div class="leg-name">${l.name}</div>
                    <div class="leg-title"><span class="${l.party === 'R' ? 'party-r' : 'party-d'}">(${l.party})</span> U.S. ${l.chamber} · ${l.state}</div>
                    
                    <div class="categories">
                        <div class="cat-item">Supply Security <div class="cat-bar"><div class="cat-fill" style="width: ${l.scores[0]}%; background: ${l.score > 80 ? 'var(--grade-a)' : 'var(--grade-f)'}"></div></div></div>
                        <div class="cat-item">IP Protection <div class="cat-bar"><div class="cat-fill" style="width: ${l.scores[1]}%; background: ${l.score > 80 ? 'var(--grade-a)' : 'var(--grade-f)'}"></div></div></div>
                        <div class="cat-item">Bio-Defense <div class="cat-bar"><div class="cat-fill" style="width: ${l.scores[2]}%; background: ${l.score > 80 ? 'var(--grade-a)' : 'var(--grade-f)'}"></div></div></div>
                        <div class="cat-item">Independence <div class="cat-bar"><div class="cat-fill" style="width: ${l.scores[3]}%; background: ${l.score > 80 ? 'var(--grade-a)' : 'var(--grade-f)'}"></div></div></div>
                    </div>

                    <div class="tags">
                        ${l.tags.map(t => `<span class="tag ${l.type === 'pos' ? 'pos' : 'neg'}">${t}</span>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
